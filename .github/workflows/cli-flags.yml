# Workflow that audits .cli-flags.toml against the flags-2-env tool whenever the CLI flag config changes.
name: CLI flags

on:
  pull_request:
    paths:
      - ".cli-flags.toml"
      - ".gitmodules"
      - "tools/flags-2-env"
      - "scripts/with-flags2env.sh"
  push:
    branches: [main]
    paths:
      - ".cli-flags.toml"
      - ".gitmodules"
      - "tools/flags-2-env"
      - "scripts/with-flags2env.sh"

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive
      - run: make -B -C tools/flags-2-env all
      - run: tools/flags-2-env/build/flags2env audit .cli-flags.toml
