# CI workflow: hard build/test gates for production-tier clients plus wasm.
name: ci
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

# Cancel superseded runs on the same ref (a new push obsoletes the previous one).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  go:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      # Preserve the same sibling layout used by the Go replace directive.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
          path: fiducia-clients
      - name: Validate GitHub Actions
        uses: docker://rhysd/actionlint@sha256:b1934ee5f1c509618f2508e6eb47ee0d3520686341fec936f3b79331f9315667
        with:
          args: fiducia-clients/.github/workflows/ci.yml fiducia-clients/.github/workflows/cli-flags.yml fiducia-clients/.github/workflows/client-packaging.yml
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
          repository: fiducia-cloud/fiducia-interfaces
          ref: e3dba39566e036ad61de91e2e6c1d625ec2b5411
          path: fiducia-interfaces
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: fiducia-clients/clients/go/go.mod
      - working-directory: fiducia-clients/clients/go
        run: go test ./...

  python:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
          path: fiducia-clients
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
          repository: fiducia-cloud/fiducia-interfaces
          ref: e3dba39566e036ad61de91e2e6c1d625ec2b5411
          path: fiducia-interfaces
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
      - working-directory: fiducia-clients/clients/python
        env:
          PYTHONDONTWRITEBYTECODE: "1"
        run: python -m unittest fiducia_test.py

  ts:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
          path: fiducia-clients
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
          repository: fiducia-cloud/fiducia-interfaces
          ref: e3dba39566e036ad61de91e2e6c1d625ec2b5411
          path: fiducia-interfaces
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: "22.22.1"
      - working-directory: fiducia-clients/clients/ts
        run: npm ci --ignore-scripts
      # npm test runs the suite and parser-checks the locking helper under Node 22.
      - working-directory: fiducia-clients/clients/ts
        run: npm test
      - working-directory: fiducia-clients/clients/ts
        run: npm run typecheck
      - working-directory: fiducia-clients/clients/ts
        run: npm audit --audit-level=high

  rust:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      # The Rust client pins the canonical interfaces repository by immutable
      # Git revision, so CI exercises the same dependency graph as consumers.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
          path: fiducia-clients
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: "1.95.0"
          components: rustfmt, clippy
      - working-directory: fiducia-clients/clients/rust
        run: cargo fmt --all -- --check
      - working-directory: fiducia-clients/clients/rust
        run: cargo clippy --locked --all-targets --all-features -- -D warnings
      - working-directory: fiducia-clients/clients/rust
        run: cargo test --all-targets --all-features --locked
      - uses: taiki-e/install-action@43aecc8d72668fbcfe75c31400bc4f890f1c5853 # v2
        with:
          tool: cargo-audit@0.22.2
      - working-directory: fiducia-clients/clients/rust
        run: cargo audit

  # clients/rust-wasm is generated from operations.json and self-contained.
  rust-wasm:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: "22.22.1"
      # Generator regression tests + drift check for every generated target.
      - run: python3 -m unittest generate_test
      - run: python3 generate.py --check
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: "1.95.0"
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: clients/rust-wasm
      # Pinned, checksummed prebuilt binary — no `curl | sh`, guaranteed on PATH.
      - uses: taiki-e/install-action@43aecc8d72668fbcfe75c31400bc4f890f1c5853 # v2
        with:
          tool: wasm-pack@0.15.0
      - uses: taiki-e/install-action@43aecc8d72668fbcfe75c31400bc4f890f1c5853 # v2
        with:
          tool: cargo-audit@0.22.2
      # compile gate
      - name: Compile to wasm32
        run: cargo build --locked --manifest-path clients/rust-wasm/Cargo.toml --target wasm32-unknown-unknown
      # full wasm-bindgen for the nodejs target (emits pkg/ with .wasm + .d.ts);
      # the .d.ts is target-agnostic, and the nodejs pkg drives the smoke test.
      - name: wasm-bindgen package
        run: wasm-pack build clients/rust-wasm --target nodejs --dev -- --locked
      # Regression guard: no `bigint` (i64 leak) may reach the generated .d.ts.
      - name: Assert generated .d.ts is clean
        run: |
          dts=$(find clients/rust-wasm/pkg -maxdepth 1 -type f -name '*.d.ts' ! -name '*_bg*' -print -quit)
          test -n "$dts"
          echo "checking $dts"
          if grep -nE ':[[:space:]]*(bigint|Map<)|:[[:space:]]*Value([;[]|$)' "$dts"; then
            echo "::error::generated .d.ts has a bigint / Value / Map<> — type-mapping regression"
            exit 1
          fi
          echo "clean"
      # Stronger guard: the generated .d.ts must be valid TypeScript.
      - name: Type-check generated .d.ts (tsc)
        run: |
          dts=$(find clients/rust-wasm/pkg -maxdepth 1 -type f -name '*.d.ts' ! -name '*_bg*' -print -quit)
          test -n "$dts"
          npx -y -p typescript@5.9.3 tsc --noEmit --lib esnext,dom "$dts"
      # Runtime behavior: drive the compiled wasm against a stubbed fetch
      # (wire format, integer bodies, timeout, error shape).
      - name: Runtime smoke test
        run: node --test clients/rust-wasm/smoke.test.mjs
      - name: Audit WASM dependency lock
        run: cargo audit --file clients/rust-wasm/Cargo.lock
