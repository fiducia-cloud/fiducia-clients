# CI workflow: hard build/test gates for production-tier clients plus wasm.
name: ci
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

# Cancel superseded runs on the same ref (a new push obsoletes the previous one).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      # Preserve the same sibling layout used by the Go replace directive.
      - uses: actions/checkout@v7
        with:
          path: fiducia-clients
      - uses: actions/checkout@v7
        with:
          repository: fiducia-cloud/fiducia-interfaces
          path: fiducia-interfaces
      - uses: actions/setup-go@v6
        with:
          go-version-file: fiducia-clients/clients/go/go.mod
      - working-directory: fiducia-clients/clients/go
        run: go test ./...

  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - working-directory: clients/python
        env:
          PYTHONDONTWRITEBYTECODE: "1"
        run: python -m unittest fiducia_test.py

  ts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          path: fiducia-clients
      - uses: actions/checkout@v7
        with:
          repository: fiducia-cloud/fiducia-interfaces
          path: fiducia-interfaces
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
      - working-directory: fiducia-clients/clients/ts
        run: npm ci
      # npm test runs the suite and parser-checks the locking helper under Node 22.
      - working-directory: fiducia-clients/clients/ts
        run: npm test
      - working-directory: fiducia-clients/clients/ts
        run: npm run typecheck

  rust:
    runs-on: ubuntu-latest
    steps:
      # Preserve the same sibling layout used by the Rust path dependency.
      - uses: actions/checkout@v7
        with:
          path: fiducia-clients
      - uses: actions/checkout@v7
        with:
          repository: fiducia-cloud/fiducia-interfaces
          path: fiducia-interfaces
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - working-directory: fiducia-clients/clients/rust
        run: cargo fmt --check
      - working-directory: fiducia-clients/clients/rust
        run: cargo clippy --all-targets -- -D warnings
      - working-directory: fiducia-clients/clients/rust
        run: cargo test --all-targets

  # clients/rust-wasm is generated from operations.json and self-contained.
  rust-wasm:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
      # Generator regression tests + drift check for every generated target.
      - run: python3 -m unittest generate_test
      - run: python3 generate.py --check
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: clients/rust-wasm
      # Pinned, checksummed prebuilt binary — no `curl | sh`, guaranteed on PATH.
      - uses: taiki-e/install-action@v2
        with:
          tool: wasm-pack
      # compile gate
      - name: Compile to wasm32
        run: cargo build --manifest-path clients/rust-wasm/Cargo.toml --target wasm32-unknown-unknown
      # full wasm-bindgen for the nodejs target (emits pkg/ with .wasm + .d.ts);
      # the .d.ts is target-agnostic, and the nodejs pkg drives the smoke test.
      - name: wasm-bindgen package
        run: wasm-pack build clients/rust-wasm --target nodejs --dev
      # Regression guard: no `bigint` (i64 leak) may reach the generated .d.ts.
      - name: Assert generated .d.ts is clean
        run: |
          dts=$(ls clients/rust-wasm/pkg/*.d.ts | grep -v _bg)
          echo "checking $dts"
          if grep -nE ':[[:space:]]*(bigint|Map<)|:[[:space:]]*Value([;[]|$)' "$dts"; then
            echo "::error::generated .d.ts has a bigint / Value / Map<> — type-mapping regression"
            exit 1
          fi
          echo "clean"
      # Stronger guard: the generated .d.ts must be valid TypeScript.
      - name: Type-check generated .d.ts (tsc)
        run: |
          dts=$(ls clients/rust-wasm/pkg/*.d.ts | grep -v _bg)
          npx -y -p typescript@5 tsc --noEmit --lib esnext,dom "$dts"
      # Runtime behavior: drive the compiled wasm against a stubbed fetch
      # (wire format, integer bodies, timeout, error shape).
      - name: Runtime smoke test
        run: node --test clients/rust-wasm/smoke.test.mjs
