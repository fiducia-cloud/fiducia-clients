name = "fiducia_client"
version = "0.1.0"
# No open-source licence granted; see LICENSE.txt. Gleam's manifest rejects
# non-SPDX ids (UNLICENSED / LicenseRef-Proprietary), so `licences` is omitted.
description = "Thin HTTP client for fiducia.cloud (distributed locks, semaphores, KV, cron, elections, service discovery)."
repository = { type = "github", user = "fiducia-cloud", repo = "fiducia-clients" }

gleam = ">= 1.0.0"

[dependencies]
gleam_stdlib = ">= 1.0.3 and < 2.0.0"
gleam_json = ">= 3.1.0 and < 4.0.0"
gleam_httpc = ">= 5.0.0 and < 6.0.0"
gleam_http = ">= 4.3.0 and < 5.0.0"

[dev-dependencies]
